  <body
    class="selection:bg-primary selection:text-black bg-bg-dark text-white font-sans">
    <nav class="p-8 flex justify-between items-center max-w-7xl mx-auto">
      <a
        href="/#portfolio"
        aria-label="Volver al portfolio"
        class="flex items-center gap-2 text-slate-400 hover:text-primary transition-colors group">
        <span class="text-xl group-hover:-translate-x-1 transition-transform"
          >←</span
        >
        <span>Volver</span>
      </a>
      <h1 class="text-xl font-bold tracking-tighter text-primary">
        <a href="/" class="flex items-center gap-2">
          <img src="img/icon.png" alt="Logo" class="w-8 h-8 object-contain" />
          <span>FOTOVAZQUEZ</span>
        </a>
      </h1>
    </nav>

    <header class="max-w-7xl mx-auto px-8 py-12 fv-reveal">
      <h2 class="text-3xl font-light">
        Galería de <span class="font-bold text-primary">Prueba</span>
      </h2>
      <p class="text-slate-400 mt-4 max-w-xl">Prueba</p>
    </header>

    <main class="max-w-5xl mx-auto px-8 pb-20">
      <div class="fv-reveal">
        <div
          id="beforeAfterSlider"
          class="relative aspect-[21/9] rounded-3xl border border-white/10 group shadow-2xl overflow-hidden">
          <img
            src="img/estudio.jpg"
            draggable="false"
            class="absolute inset-0 w-full h-full object-cover select-none" />

          <div class="absolute bottom-6 right-6 z-0 pointer-events-none">
            <span
              class="label-tag bg-primary/30 backdrop-blur-md text-black text-[10px] font-bold uppercase tracking-[0.2em] px-4 py-2 rounded-3xl shadow-xl border border-white/10">
              Edición Final
            </span>
          </div>

          <div
            id="beforeImage"
            class="absolute inset-0 w-full h-full overflow-hidden z-10 border-r border-primary/30">
            <img
              src="img/exterior.jpg"
              draggable="false"
              class="absolute inset-0 w-full h-full object-cover select-none" />

            <div class="absolute bottom-6 left-6 pointer-events-none">
              <span
                class="label-tag bg-black/30 backdrop-blur-md text-white/90 text-[10px] font-medium uppercase tracking-[0.2em] px-4 py-2 rounded-3xl border border-white/10 shadow-xl">
                RAW Original
              </span>
            </div>
          </div>

          <div id="sliderHandle" style="z-index: 20">
            <div class="handle-circle">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="black"
                stroke-width="3"
                stroke-linecap="round"
                stroke-linejoin="round">
                <path d="m18 8-4 4 4 4M6 8l4 4-4 4" />
              </svg>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div class="max-w-7xl mx-auto px-8">
      <div class="mt-3 pt-5 pb-5">
        <a
          href="/#portfolio"
          class="inline-flex items-center gap-2 text-slate-400 hover:text-primary transition-colors group">
          <span class="text-xl group-hover:-translate-x-1 transition-transform"
            >←</span
          >
          <span>Volver</span>
        </a>
      </div>
    </div>

    <footer class="text-center py-6 border-t border-white/5 tracking-wide">
      <div class="max-w-7xl mx-auto flex flex-col gap-2">
        <p
          class="text-[11px] text-slate-500 font-medium uppercase tracking-[0.2em]">
          &copy; 2026 <span class="text-primary/80">FOTOVAZQUEZ</span>
        </p>
        <div
          class="flex flex-wrap justify-center items-center gap-x-3 text-xs text-slate-600">
          <a href="/condiciones" class="hover:text-primary transition-colors"
            >Condiciones</a
          >
          <span class="text-white/5">|</span>
          <a href="/autor" class="hover:text-primary transition-colors"
            >Sobre el autor</a
          >
          <span class="text-white/5">|</span>
          <a href="/legal" class="hover:text-primary transition-colors"
            >Legal y Privacidad</a
          >
        </div>
      </div>
    </footer>
  </body>
