<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Página no encontrada | Fotovazquez</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;700&display=swap"
      rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { primary: "#D0BB95", "bg-dark": "#131313" },
            fontFamily: { sans: ["Comfortaa", "sans-serif"] },
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #131313;
        color: white;
      }
      .aperture-slow {
        animation: rotate 10s linear infinite;
      }
      @keyframes rotate {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body class="flex items-center justify-center min-h-screen overflow-hidden">
    <div class="text-center px-6">
      <div class="flex justify-center mb-8">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="80"
          height="80"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#D0BB95"
          stroke-width="1"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="aperture-slow opacity-20">
          <circle cx="12" cy="12" r="10" />
          <line x1="14.31" y1="8" x2="20.05" y2="17.94" />
          <line x1="9.69" y1="8" x2="21.17" y2="8" />
          <line x1="7.38" y1="12" x2="13.12" y2="2.06" />
          <line x1="9.69" y1="16" x2="3.95" y2="6.06" />
          <line x1="14.31" y1="16" x2="2.83" y2="16" />
          <line x1="16.62" y1="12" x2="10.88" y2="21.94" />
        </svg>
      </div>

      <h1 class="text-6xl font-bold text-primary mb-4 italic">404</h1>
      <h2 class="text-xl font-light tracking-widest uppercase mb-8">
        Enfoque perdido
      </h2>

      <p class="text-slate-500 max-w-md mx-auto mb-12 text-sm leading-relaxed">
        Parece que la página que buscas se ha quedado demasiado desenfocada o no
        existe. Volvamos a lo importante.
      </p>

      <a
        href="/"
        class="inline-block px-8 py-3 border border-primary text-primary text-xs uppercase tracking-[0.3em] hover:bg-primary hover:text-black transition-all duration-500 rounded-full">
        Volver al inicio
      </a>
    </div>

    <div class="absolute bottom-10 left-0 w-full text-center">
      <p class="text-[10px] text-white/20 uppercase tracking-[0.3em]">
        FOTOVAZQUEZ &copy; 2026
      </p>
    </div>
  </body>
</html>
